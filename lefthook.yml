pre-commit:
  parallel: true
  commands:
    typecheck:
      glob: "*.ts"
      run: export PATH="$HOME/.bun/bin:$PATH" && bun run typecheck
    lint:
      glob: "*.{ts,json}"
      run: export PATH="$HOME/.bun/bin:$PATH" && bun run check
    unit-tests:
      run: export PATH="$HOME/.bun/bin:$PATH" && bun test

pre-push:
  commands:
    typecheck:
      run: export PATH="$HOME/.bun/bin:$PATH" && bun run typecheck
    lint:
      run: export PATH="$HOME/.bun/bin:$PATH" && bun run check
    all-tests:
      run: export PATH="$HOME/.bun/bin:$PATH" && bun test
