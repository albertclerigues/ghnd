pre-commit:
  parallel: true
  commands:
    typecheck:
      glob: "*.ts"
      run: bun run typecheck
    lint:
      glob: "*.{ts,json}"
      run: bun run check
    unit-tests:
      run: bun test

pre-push:
  commands:
    typecheck:
      run: bun run typecheck
    lint:
      run: bun run check
    all-tests:
      run: bun test
